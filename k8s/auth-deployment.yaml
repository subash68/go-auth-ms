apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: envoy-proxy
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/version: "v1"
    app.kubernetes.io/part-of: go-auth-ms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        app.kubernetes.io/name: auth-service
        app.kubernetes.io/version: "v1"
        app.kubernetes.io/part-of: go-auth-ms
    spec:
      # Wait for MySQL to be reachable before starting the container.
      # initContainers gives us a retry loop without complicating the main binary.
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mysql 3306; do
                echo "Waiting for MySQL…"
                sleep 2
              done
              echo "MySQL is up."

      containers:
        - name: auth-service
          # Replace with your actual image once pushed to a registry, e.g.:
          #   image: ghcr.io/subash68/go-auth-ms:latest
          image: go-auth-ms:latest
          imagePullPolicy: IfNotPresent   # use Never for local minikube/kind
          ports:
            - name: grpc
              containerPort: 9090
              protocol: TCP
            - name: http
              containerPort: 8080
              protocol: TCP
          args:
            - "-grpc-port=$(GRPC_PORT)"
            - "-http-port=$(HTTP_PORT)"
            - "-db-host=$(DB_HOST)"
            - "-db-user=$(DB_USER)"
            - "-db-password=$(DB_PASSWORD)"
            - "-db-schema=$(DB_SCHEMA)"
            - "-log-level=$(LOG_LEVEL)"
            - "-log-time-format=$(LOG_TIME_FORMAT)"
          env:
            # ── Non-sensitive config from ConfigMap ──────────────────────────
            - name: GRPC_PORT
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: GRPC_PORT
            - name: HTTP_PORT
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: HTTP_PORT
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: DB_HOST
            - name: DB_SCHEMA
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: DB_SCHEMA
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: LOG_LEVEL
            - name: LOG_TIME_FORMAT
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: LOG_TIME_FORMAT
            # ── Sensitive config from Secret ─────────────────────────────────
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: auth-db-secret
                  key: mysql-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-db-secret
                  key: mysql-password

          # ── Health probes ────────────────────────────────────────────────
          # The HTTP gateway exposes /healthz; fall back to TCP if not present.
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3

          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3

          # ── Resource limits ──────────────────────────────────────────────
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
