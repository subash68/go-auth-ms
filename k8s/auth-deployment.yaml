apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: envoy-proxy
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/version: "v2"
    app.kubernetes.io/part-of: go-auth-ms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        app.kubernetes.io/name: auth-service
        app.kubernetes.io/version: "v2"
        app.kubernetes.io/part-of: go-auth-ms
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL is up."
      containers:
        - name: auth-service
          image: go-auth-ms:v2
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 9090
              protocol: TCP
            - name: http
              containerPort: 8080
              protocol: TCP
          args:
            - "-grpc-port=$(GRPC_PORT)"
            - "-http-port=$(HTTP_PORT)"
            - "-db-host=$(DB_HOST)"
            - "-db-user=$(DB_USER)"
            - "-db-password=$(DB_PASSWORD)"
            - "-db-schema=$(DB_SCHEMA)"
            - "-db-sslmode=$(DB_SSLMODE)"
            - "-log-level=$(LOG_LEVEL)"
            - "-log-time-format=$(LOG_TIME_FORMAT)"
          env:
            - name: GRPC_PORT
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: GRPC_PORT
            - name: HTTP_PORT
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: HTTP_PORT
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: DB_HOST
            - name: DB_SCHEMA
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: DB_SCHEMA
            - name: DB_SSLMODE
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: DB_SSLMODE
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: LOG_LEVEL
            - name: LOG_TIME_FORMAT
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: LOG_TIME_FORMAT
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: auth-db-secret
                  key: postgres-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-db-secret
                  key: postgres-password
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
