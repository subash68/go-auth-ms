apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-sql
  namespace: envoy-proxy
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: go-auth-ms
data:
  init.sql: |
    -- Enable UUID generation
    CREATE EXTENSION IF NOT EXISTS "pgcrypto";

    CREATE TABLE IF NOT EXISTS users (
        id            UUID          PRIMARY KEY DEFAULT gen_random_uuid(),
        username      VARCHAR(50)   NOT NULL,
        first_name    VARCHAR(100)  NOT NULL,
        last_name     VARCHAR(100)  NOT NULL,
        email         VARCHAR(255),
        password_hash VARCHAR(255)  NOT NULL,
        is_active     BOOLEAN       NOT NULL DEFAULT TRUE,
        created_at    TIMESTAMPTZ   NOT NULL DEFAULT NOW(),
        updated_at    TIMESTAMPTZ   NOT NULL DEFAULT NOW(),
        deleted_at    TIMESTAMPTZ
    );

    ALTER TABLE users
        ADD CONSTRAINT IF NOT EXISTS chk_users_username_alphanumeric
        CHECK (username ~ '^[a-zA-Z0-9_]+$');

    CREATE UNIQUE INDEX IF NOT EXISTS idx_users_username
        ON users (username) WHERE deleted_at IS NULL;

    CREATE UNIQUE INDEX IF NOT EXISTS idx_users_email
        ON users (email) WHERE deleted_at IS NULL AND email IS NOT NULL;

    CREATE TABLE IF NOT EXISTS roles (
        id          BIGSERIAL     PRIMARY KEY,
        name        VARCHAR(100)  NOT NULL UNIQUE,
        description TEXT,
        created_at  TIMESTAMPTZ   NOT NULL DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS permissions (
        id          BIGSERIAL     PRIMARY KEY,
        name        VARCHAR(100)  NOT NULL UNIQUE,
        description TEXT,
        created_at  TIMESTAMPTZ   NOT NULL DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS role_permissions (
        role_id       BIGINT  NOT NULL REFERENCES roles(id)       ON DELETE CASCADE,
        permission_id BIGINT  NOT NULL REFERENCES permissions(id) ON DELETE CASCADE,
        PRIMARY KEY (role_id, permission_id)
    );

    CREATE TABLE IF NOT EXISTS user_roles (
        user_id     UUID    NOT NULL REFERENCES users(id)  ON DELETE CASCADE,
        role_id     BIGINT  NOT NULL REFERENCES roles(id)  ON DELETE CASCADE,
        assigned_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        PRIMARY KEY (user_id, role_id)
    );

    CREATE TABLE IF NOT EXISTS sessions (
        id             UUID         PRIMARY KEY DEFAULT gen_random_uuid(),
        user_id        UUID         NOT NULL REFERENCES users(id) ON DELETE CASCADE,
        refresh_token  TEXT         NOT NULL UNIQUE,
        user_agent     TEXT,
        ip_address     INET,
        is_revoked     BOOLEAN      NOT NULL DEFAULT FALSE,
        expires_at     TIMESTAMPTZ  NOT NULL,
        created_at     TIMESTAMPTZ  NOT NULL DEFAULT NOW(),
        revoked_at     TIMESTAMPTZ
    );

    CREATE OR REPLACE FUNCTION set_updated_at()
    RETURNS TRIGGER AS $$
    BEGIN NEW.updated_at = NOW(); RETURN NEW; END;
    $$ LANGUAGE plpgsql;

    CREATE OR REPLACE TRIGGER trg_users_updated_at
        BEFORE UPDATE ON users
        FOR EACH ROW EXECUTE FUNCTION set_updated_at();

    INSERT INTO roles (name, description) VALUES
        ('admin',  'Full system access'),
        ('user',   'Standard authenticated user'),
        ('viewer', 'Read-only access')
    ON CONFLICT (name) DO NOTHING;

    INSERT INTO permissions (name, description) VALUES
        ('auth:register', 'Register new users'),
        ('auth:login',    'Authenticate and acquire tokens'),
        ('auth:logout',   'Revoke session'),
        ('auth:refresh',  'Refresh access token'),
        ('user:read',     'View user profiles'),
        ('user:write',    'Create or update users'),
        ('user:delete',   'Soft-delete users'),
        ('role:read',     'View roles and permissions'),
        ('role:write',    'Create or update roles'),
        ('role:assign',   'Assign roles to users')
    ON CONFLICT (name) DO NOTHING;

    INSERT INTO role_permissions (role_id, permission_id)
    SELECT r.id, p.id FROM roles r, permissions p WHERE r.name = 'admin'
    ON CONFLICT DO NOTHING;

    INSERT INTO role_permissions (role_id, permission_id)
    SELECT r.id, p.id FROM roles r, permissions p
    WHERE r.name = 'user' AND p.name IN ('auth:login','auth:logout','auth:refresh','user:read')
    ON CONFLICT DO NOTHING;

    INSERT INTO role_permissions (role_id, permission_id)
    SELECT r.id, p.id FROM roles r, permissions p
    WHERE r.name = 'viewer' AND p.name IN ('auth:login','auth:logout','auth:refresh','user:read','role:read')
    ON CONFLICT DO NOTHING;
