apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: envoy-proxy
  labels:
    app.kubernetes.io/name: mysql
    app.kubernetes.io/part-of: go-auth-ms
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  # Remove storageClassName to use the cluster default.
  # Set explicitly if your cluster has a named StorageClass, e.g.:
  # storageClassName: standard
