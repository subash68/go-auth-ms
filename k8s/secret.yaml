apiVersion: v1
kind: Secret
metadata:
  name: auth-db-secret
  namespace: envoy-proxy
  labels:
    app.kubernetes.io/part-of: go-auth-ms
type: Opaque
# Values are base64-encoded. To regenerate:
#   echo -n 'yourvalue' | base64
#
#   root      -> cm9vdA==
#   authuser  -> YXV0aHVzZXI=
#   authpass  -> YXV0aHBhc3M=
#   authdb    -> YXV0aGRi
stringData:
  mysql-root-password: root
  mysql-user: authuser
  mysql-password: authpass
  mysql-database: authdb
